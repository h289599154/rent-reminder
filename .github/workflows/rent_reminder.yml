name: 房租提醒

on:
  schedule:
    # 每小时检查一次，脚本内部判断是否需要推送
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rent reminder
        env:
          TENCENT_CLIENT_ID: ${{ secrets.TENCENT_CLIENT_ID }}
          TENCENT_ACCESS_TOKEN: ${{ secrets.TENCENT_ACCESS_TOKEN }}
          TENCENT_OPEN_ID: ${{ secrets.TENCENT_OPEN_ID }}
          TENCENT_CLIENT_SECRET: ${{ secrets.TENCENT_CLIENT_SECRET }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FRIEND_PUSHPLUS_TOKEN: ${{ secrets.FRIEND_PUSHPLUS_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python rent_reminder.py
