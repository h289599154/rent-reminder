name: Rent Reminder Daily
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: '推送给谁 (owner/friend_b/friend_c/all)'
        required: false
        default: 'owner'

env:
  TZ: Asia/Shanghai

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run reminder
        env:
          TENCENT_CLIENT_ID: ${{ secrets.TENCENT_CLIENT_ID }}
          TENCENT_ACCESS_TOKEN: ${{ secrets.TENCENT_ACCESS_TOKEN }}
          TENCENT_OPEN_ID: ${{ secrets.TENCENT_OPEN_ID }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FRIEND_B_TOKEN: ${{ secrets.FRIEND_B_TOKEN }}
          FRIEND_C_TOKEN: ${{ secrets.FRIEND_C_TOKEN }}
        run: python rent_reminder.py
      - name: Keep repo alive
        run: echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') - 每日保活" > alive.txt
      - name: Commit alive signal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alive.txt
          git diff --staged --quiet || git commit -m "🤖 每日保活签到 [skip ci]"
      - name: Push alive signal
        run: git push
