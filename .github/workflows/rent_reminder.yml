name: Rent Reminder Daily

on:
  schedule:
    # 第一次推送：北京时间 14:00（多触发点防漏）
    - cron: '0 6 * * *'    # 14:00
    - cron: '5 6 * * *'    # 14:05（补发）
    - cron: '10 6 * * *'   # 14:10（补发）
    # 第二次推送：北京时间 19:00（多触发点防漏）
    - cron: '0 11 * * *'   # 19:00
    - cron: '5 11 * * *'   # 19:05（补发）
    - cron: '10 11 * * *'  # 19:10（补发）
  workflow_dispatch:
    # 允许手动触发，方便测试

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rent reminder
        env:
          TENCENT_CLIENT_ID: ${{ secrets.TENCENT_CLIENT_ID }}
          TENCENT_ACCESS_TOKEN: ${{ secrets.TENCENT_ACCESS_TOKEN }}
          TENCENT_OPEN_ID: ${{ secrets.TENCENT_OPEN_ID }}
          TENCENT_CLIENT_SECRET: ${{ secrets.TENCENT_CLIENT_SECRET }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FRIEND_PUSHPLUS_TOKEN: ${{ secrets.FRIEND_PUSHPLUS_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python rent_reminder.py
